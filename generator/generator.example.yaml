# 数据库类型,可选: mysql / postgres / sqlite / sqlserver
db_type: mysql
host: localhost
port: 3306
username: root
password: "123456"
database: gin-admin-api

# 其他驱动示例:
# ── PostgreSQL ──
# db_type: postgres
# host: localhost
# port: 5432
# username: postgres
# password: "123456"
# database: my_db

# ── SQLite ──
# db_type: sqlite
# database: ./data.db    # database 直接填文件路径,其他字段忽略

# ── SQL Server ──
# db_type: sqlserver
# host: localhost
# port: 1433
# username: sa
# password: "MyPassword!"
# database: my_db

out_path: ./internal/dal/dao
model_pkg_path: ./internal/dal/model/entity
repo_path: ./internal/dal/repository
api_path: ./apps/admin/desc
# go-zero 项目:配置 api_path 后不生成 vo/dto
# mapper 生成后自行挪到对应目录并修改 import 路径
vo_path: ./internal/dal/vo
dto_path: ./internal/dal/dto
mapper_path: ./internal/dal/mapper
package: gin-admin-api
