# 数据库类型,可选: mysql / postgres / sqlite / sqlserver
db_type: mysql
host: localhost
port: 3306
username: root
password: "123456"
database: gin-admin-api

# 其他驱动示例:
# ── PostgreSQL ──
# db_type: postgres
# host: localhost
# port: 5432
# username: postgres
# password: "123456"
# database: my_db

# ── SQLite ──
# db_type: sqlite
# database: ./data.db    # database 直接填文件路径,其他字段忽略

# ── SQL Server ──
# db_type: sqlserver
# host: localhost
# port: 1433
# username: sa
# password: "MyPassword!"
# database: my_db

out_path: ./internal/dal/dao
model_pkg_path: ./internal/dal/model/entity
repo_path: ./internal/dal/repository
api_path: ./apps/admin/desc
proto_path: ./apps/rpc
# go-zero 项目:配置 api_path 后不生成 vo/dto
# 未配置 proto_path 时生成 DTO/VO ↔ Entity mapper。
# 配置 proto_path 时生成到 mapper/entityproto；同时配置 api_path 时再生成到 mapper/apiproto。
# mapper 生成后可按项目分层挪到对应目录
vo_path: ./internal/dal/vo
dto_path: ./internal/dal/dto
mapper_path: ./internal/dal/mapper
package: gin-admin-api
exclude_tables:
  - sys_config
  - sys_dict
